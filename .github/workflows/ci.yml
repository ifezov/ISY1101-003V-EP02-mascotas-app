name: Backend CI/CD — Test, Build, Push GHCR, Deploy EC2

on:
  push:
    branches: ['**']

env:
  IMAGE_NAME: mascotas-app

permissions:
  contents: write
  packages: write   # necesario para publicar en ghcr.io

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: BUILD & TEST — tests + cobertura ≥ 80%
# ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (cobertura ≥ 80%)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Compilar y ejecutar tests
        run: gradle clean check jacocoTestReport -Dnet.bytebuddy.experimental=true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: |
            build/reports/jacoco/test/html/
            build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/test/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: SECURITY — SonarCloud + Snyk
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - run: gradle clean assemble -Dnet.bytebuddy.experimental=true

      - uses: actions/download-artifact@v4
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/test/
        continue-on-error: true

      - name: SonarCloud
        run: |
          gradle sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=false \
            -Dnet.bytebuddy.experimental=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Snyk CLI
        run: npm install -g snyk@latest

      - name: Snyk SCA
        run: |
          snyk test \
            --severity-threshold=high \
            --fail-on=all \
            --configuration-matching='^(compile|runtime|default)$'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk SARIF
        if: always()
        run: |
          snyk test \
            --severity-threshold=high \
            --configuration-matching='^(compile|runtime|default)$' \
            --sarif-file-output=snyk.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-security-report
          path: snyk.sarif
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: VERSIONING — calcula v1.x.0 y crea el tag git
# ─────────────────────────────────────────────────────────────────────────────
  versioning:
    name: Semantic Version (v1.x.0)
    runs-on: ubuntu-latest
    needs: security
    outputs:
      new_tag: ${{ steps.calc.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular y crear tag
        id: calc
        run: |
          LAST=$(git tag --list 'v1.*' --sort=-v:refname | head -1)
          if [ -z "$LAST" ]; then
            NEW="v1.0.0"
          else
            MINOR=$(echo $LAST | cut -d. -f2)
            NEW="v1.$((MINOR + 1)).0"
          fi
          echo "Último: ${LAST:-ninguno} → Nuevo: $NEW"
          echo "new_tag=$NEW" >> $GITHUB_OUTPUT
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW
          git push origin $NEW

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4: BUILD & PUSH GHCR
# ─────────────────────────────────────────────────────────────────────────────
  build-push-ghcr:
    name: Build & Push GHCR (${{ needs.versioning.outputs.new_tag }})
    runs-on: ubuntu-latest
    needs: versioning

    steps:
      - uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparar nombre de imagen (minúsculas)
        id: image
        run: |
          echo "ref=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}:${{ needs.versioning.outputs.new_tag }}
            ${{ steps.image.outputs.ref }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Resumen
        run: |
          echo "### Imagen publicada en GHCR" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagen:** \`${{ steps.image.outputs.ref }}\`" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5: DEPLOY EN EC2-APP VIA SSM
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy EC2-App via SSM
    runs-on: ubuntu-latest
    needs: build-push-ghcr

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Enviar deploy via SSM
        id: ssm-cmd
        run: |
          PARAMS=$(cat <<'EOF'
          {"commands":[
            "docker network create mascotas-network 2>/dev/null || true",
            "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin",
            "docker pull ghcr.io/ifezov/mascotas-app:latest",
            "docker stop mascotas-app 2>/dev/null || true",
            "docker rm   mascotas-app 2>/dev/null || true",
            "docker run -d --name mascotas-app --restart unless-stopped -p 8080:8080 -e SPRING_PROFILES_ACTIVE=prod -e SPRING_DATASOURCE_URL=jdbc:postgresql://mascotas-datos:5432/mascotas -e SPRING_DATASOURCE_USERNAME=mascotas_user -e SPRING_DATASOURCE_PASSWORD=mascotas_pass -e CORS_ORIGINS=* --network mascotas-network ghcr.io/ifezov/mascotas-app:latest",
            "docker logout ghcr.io"
          ]}
          EOF
          )
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_APP_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --comment "Deploy backend ${{ needs.versioning.outputs.new_tag }}" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $CMD_ID"

      - name: Esperar resultado (máx 5 min)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
              --instance-id "${{ secrets.EC2_APP_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Intento $i/30 — $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
                --instance-id "${{ secrets.EC2_APP_ID }}" \
                --query "StandardOutputContent" --output text
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
                --instance-id "${{ secrets.EC2_APP_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          exit 1

      - name: Resumen del deploy
        if: success()
        run: |
          echo "### Deploy completado" >> $GITHUB_STEP_SUMMARY
          echo "- **Versión:** \`${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **EC2-App:** \`${{ secrets.EC2_APP_ID }}\`" >> $GITHUB_STEP_SUMMARY
