spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://mascotas-datos:5432/mascotas
    driverClassName: org.postgresql.Driver
    username: mascotas_user
    password: mascotas_pass

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

cors:
  allowed-origins: "http://localhost:3000,http://localhost:5173"
